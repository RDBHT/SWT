<svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#3a5a8a"/>
    </marker>
  </defs>
  <rect width="1000" height="680" fill="#ffffff"/>

  <!-- ============ Beziehungs-Linien ============ -->
  <!-- A: Onboarding -> IAM (Conformist) -->
  <line x1="745" y1="150" x2="622" y2="60" stroke="#3a5a8a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- B: Dokumentenmanagement -> Wissenssuche (Customer/Supplier + ACL) -->
  <line x1="230" y1="209" x2="368" y2="238" stroke="#3a5a8a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- C: Community & Q&A -> Wissenssuche (Customer/Supplier) -->
  <line x1="230" y1="345" x2="372" y2="268" stroke="#3a5a8a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- D: Mitarbeiterverzeichnis -> Wissenssuche (Customer/Supplier) -->
  <line x1="745" y1="418" x2="612" y2="266" stroke="#3a5a8a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- E: Wissenssuche <-> AI-Assistent (Shared Kernel) -->
  <line x1="490" y1="281" x2="490" y2="353" stroke="#2f7d4f" stroke-width="4"/>
  <!-- F: Onboarding <-> Learning & Schulung (Partnership) -->
  <line x1="837" y1="190" x2="837" y2="263" stroke="#3a5a8a" stroke-width="3"/>
  <!-- G: Onboarding -> Mitarbeiterverzeichnis (Customer/Supplier), Bogen rechts -->
  <path d="M930,159 Q992,294 930,429" fill="none" stroke="#3a5a8a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ Bounded-Context-Boxen ============ -->
  <!-- 1 IAM -->
  <rect x="380" y="26" width="240" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="500" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Identitäts- &amp;</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Zugriffsverwaltung</text>

  <!-- 2 Dokumentenmanagement -->
  <rect x="40" y="180" width="190" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="135" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Dokumenten-</text>
  <text x="135" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">management</text>

  <!-- 3 Community & Q&A -->
  <rect x="40" y="318" width="190" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="135" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Community &amp; Q&amp;A</text>

  <!-- 4 Wissenssuche (CORE) -->
  <rect x="370" y="217" width="240" height="64" rx="8" fill="#d8ebe0" stroke="#2f7d4f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="490" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a26">Wissenssuche &amp;</text>
  <text x="490" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a26">Retrieval</text>
  <text x="490" y="275" text-anchor="middle" font-size="9" fill="#2f7d4f">CORE</text>

  <!-- 5 AI-Assistent (CORE) -->
  <rect x="395" y="353" width="190" height="64" rx="8" fill="#d8ebe0" stroke="#2f7d4f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="490" y="383" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a26">AI-Assistent</text>
  <text x="490" y="400" text-anchor="middle" font-size="9" fill="#2f7d4f">CORE</text>

  <!-- 6 Onboarding -->
  <rect x="745" y="130" width="185" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="837" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Onboarding</text>

  <!-- 7 Learning & Schulung -->
  <rect x="745" y="265" width="185" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="837" y="289" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Learning &amp;</text>
  <text x="837" y="307" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Schulung</text>

  <!-- 8 Mitarbeiterverzeichnis -->
  <rect x="745" y="400" width="185" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="837" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Mitarbeiter-</text>
  <text x="837" y="442" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">verzeichnis</text>

  <!-- 9 News & Kommunikation -->
  <rect x="380" y="560" width="240" height="58" rx="8" fill="#eef3f9" stroke="#3a5a8a" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="500" y="584" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">News &amp;</text>
  <text x="500" y="602" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2b40">Kommunikation</text>

  <!-- ============ Kanten-Labels ============ -->
  <g font-size="10.5" fill="#1a2b40">
    <!-- A Conformist -->
    <rect x="648" y="96" width="74" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="685" y="109" text-anchor="middle">Conformist</text>
    <!-- B Conformist + ACL -->
    <rect x="244" y="206" width="112" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="300" y="219" text-anchor="middle">Conformist + ACL</text>
    <!-- C Customer/Supplier -->
    <rect x="240" y="296" width="116" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="298" y="309" text-anchor="middle">Customer/Supplier</text>
    <!-- D Customer/Supplier -->
    <rect x="612" y="332" width="116" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="670" y="345" text-anchor="middle">Customer/Supplier</text>
    <!-- E Shared Kernel -->
    <rect x="500" y="308" width="92" height="18" fill="#ffffff" stroke="#2f7d4f" stroke-width="0.9"/>
    <text x="546" y="321" text-anchor="middle" fill="#1a3a26">Shared Kernel</text>
    <!-- F Partnership -->
    <rect x="847" y="217" width="80" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="887" y="230" text-anchor="middle">Partnership</text>
    <!-- G Customer/Supplier -->
    <rect x="930" y="285" width="116" height="18" fill="#ffffff" stroke="#9aafc7" stroke-width="0.8"/>
    <text x="988" y="298" text-anchor="middle">Customer/Supplier</text>
  </g>

  <!-- ============ U/D-Markierungen ============ -->
  <g font-size="10" font-weight="bold" fill="#ffffff">
    <!-- A: IAM=U, Onboarding=D -->
    <rect x="613" y="52" width="15" height="15" fill="#3a5a8a"/><text x="620" y="63" text-anchor="middle">U</text>
    <rect x="738" y="143" width="15" height="15" fill="#3a5a8a"/><text x="745" y="154" text-anchor="middle">D</text>
    <!-- B: DM=U, Suche=D -->
    <rect x="223" y="201" width="15" height="15" fill="#3a5a8a"/><text x="230" y="212" text-anchor="middle">U</text>
    <rect x="361" y="231" width="15" height="15" fill="#3a5a8a"/><text x="368" y="242" text-anchor="middle">D</text>
    <!-- C: Community=U, Suche=D -->
    <rect x="223" y="338" width="15" height="15" fill="#3a5a8a"/><text x="230" y="349" text-anchor="middle">U</text>
    <rect x="365" y="261" width="15" height="15" fill="#3a5a8a"/><text x="372" y="272" text-anchor="middle">D</text>
    <!-- D: Verzeichnis=U, Suche=D -->
    <rect x="738" y="411" width="15" height="15" fill="#3a5a8a"/><text x="745" y="422" text-anchor="middle">U</text>
    <rect x="605" y="259" width="15" height="15" fill="#3a5a8a"/><text x="612" y="270" text-anchor="middle">D</text>
    <!-- G: Onboarding=U, Verzeichnis=D -->
    <rect x="923" y="152" width="15" height="15" fill="#3a5a8a"/><text x="930" y="163" text-anchor="middle">U</text>
    <rect x="923" y="422" width="15" height="15" fill="#3a5a8a"/><text x="930" y="433" text-anchor="middle">D</text>
  </g>

  <!-- ============ Sammel-Hinweise (alle-Beziehungen) ============ -->
  <text x="500" y="102" text-anchor="middle" font-size="9.5" fill="#5a6a80" font-style="italic">Open Host Service + Published Language (OIDC) — Authentifizierung für alle Domains</text>
  <text x="500" y="546" text-anchor="middle" font-size="9.5" fill="#5a6a80" font-style="italic">Open Host Service — empfängt Benachrichtigungs-Aufrufe aller Domains</text>

  <!-- Legende -->
  <g font-size="9.5" fill="#5a6a80">
    <text x="40" y="640">U = Upstream · D = Downstream</text>
    <rect x="40" y="650" width="22" height="5" fill="#2f7d4f"/>
    <text x="70" y="656">Shared Kernel (beide Core)</text>
    <rect x="240" y="650" width="22" height="4" fill="#3a5a8a"/>
    <text x="270" y="656">Partnership</text>
  </g>
</svg>
