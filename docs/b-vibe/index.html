<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT-Service-Monitor — Vibe-Version (Teil B)</title>
<style>
  /* Vibe-Version: bewusst alles in einer Datei, nicht modular geschnitten.
     Status-Farbfamilie und Typografie aus dem Teil-A-UI-Entwurf übernommen. */
  :root {
    --ok:       oklch(62% 0.14 145);
    --degraded: oklch(72% 0.15 75);
    --down:     oklch(58% 0.18 25);
    --unknown:  oklch(60% 0.01 250);
    --accent:   oklch(48% 0.13 250);
    --bg:       #f6f7f9;
    --card:     #ffffff;
    --ink:      #1d2330;
    --muted:    #5a6273;
    --border:   #e4e6ea;
    --mono:     "IBM Plex Mono", ui-monospace, monospace;
    --sans:     "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap");
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); background: var(--bg); color: var(--ink); }
  header.top { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; background: var(--card); border-bottom: 1px solid var(--border); }
  header.top h1 { font-size: 17px; margin: 0; letter-spacing: -.2px; }
  header.top .live { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  header.top .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  main { max-width: 1040px; margin: 0 auto; padding: 20px 22px 60px; }

  .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: border-color .15s, transform .05s; }
  .kpi:hover { border-color: var(--accent); }
  .kpi[aria-pressed="true"] { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .kpi .n { font-size: 24px; font-weight: 600; font-family: var(--mono); }
  .kpi .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .kpi.ok .n { color: var(--ok); } .kpi.degraded .n { color: var(--degraded); }
  .kpi.down .n { color: var(--down); } .kpi.unknown .n { color: var(--unknown); }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar input[type=search] { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 14px; }
  button { font-family: var(--sans); font-size: 14px; cursor: pointer; border-radius: 8px; border: 1px solid var(--border); background: var(--card); padding: 8px 14px; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; font-size: 13.5px; border-bottom: 1px solid var(--border); }
  th { background: #fafbfc; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  tr:last-child td { border-bottom: none; }
  td.mono, .mono { font-family: var(--mono); font-size: 12.5px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; color: #fff; }
  .badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.85); }
  .badge.OK { background: var(--ok); } .badge.DEGRADED { background: var(--degraded); color: #3a2c00; }
  .badge.DOWN { background: var(--down); } .badge.UNKNOWN { background: var(--unknown); }
  .type-pill { font-family: var(--mono); font-size: 11px; padding: 1px 7px; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); }
  .del { color: var(--down); border-color: transparent; background: transparent; padding: 4px 8px; }
  .del:hover { background: #fdecec; }

  .empty { text-align: center; padding: 54px 20px; background: var(--card); border: 1px dashed var(--border); border-radius: 12px; }
  .empty h2 { margin: 0 0 6px; } .empty p { color: var(--muted); margin: 0 0 16px; }

  dialog { border: 1px solid var(--border); border-radius: 12px; padding: 0; width: min(440px, 92vw); }
  dialog::backdrop { background: rgba(20,25,42,.35); }
  form.svc { padding: 20px; }
  form.svc h3 { margin: 0 0 14px; }
  form.svc label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  form.svc input, form.svc select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 14px; }
  form.svc .row { display: flex; gap: 10px; }
  form.svc .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  footer.note { max-width: 1040px; margin: 0 auto; padding: 0 22px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header class="top">
  <h1>IT-Service-Monitor <span style="color:var(--muted);font-weight:400">· Vibe-Version</span></h1>
  <div class="live"><span class="dot"></span> Live · Checks alle 3&nbsp;s</div>
</header>

<main>
  <div class="kpis" id="kpis"></div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="Service oder Ziel suchen …" aria-label="Suche">
    <button id="clearFilter">Filter zurücksetzen</button>
    <button class="primary" id="addBtn">+ Service hinzufügen</button>
  </div>

  <div id="content"></div>
</main>

<footer class="note">
  Daten werden bewusst <strong>lokal im Browser</strong> gehalten (<code>localStorage</code>) — keine
  Cloud, kein Backend. Health-Checks sind zu Demozwecken simuliert.
</footer>

<dialog id="dlg">
  <form class="svc" id="svcForm" method="dialog">
    <h3>Service hinzufügen</h3>
    <label for="f-name">Name</label>
    <input id="f-name" required placeholder="z. B. API-Gateway">
    <label for="f-type">Check-Typ</label>
    <select id="f-type">
      <option value="HTTP">HTTP</option>
      <option value="TCP">TCP-Port</option>
      <option value="DNS">DNS</option>
    </select>
    <label for="f-target">Ziel</label>
    <input id="f-target" required placeholder="https://example.com">
    <div class="hint" id="targetHint">HTTP: vollständige URL inkl. https://</div>
    <label for="f-interval">Intervall (Sekunden)</label>
    <input id="f-interval" type="number" min="5" value="30">
    <div class="actions">
      <button type="button" id="cancelBtn">Abbrechen</button>
      <button type="submit" class="primary">Speichern</button>
    </div>
  </form>
</dialog>

<script>
(function () {
  "use strict";
  var KEY = "monitor.services.v1";
  var STATUSES = ["OK", "DEGRADED", "DOWN", "UNKNOWN"];
  var activeFilter = null;

  var seed = [
    { name: "API-Gateway",   type: "HTTP", target: "https://api.internal/health", interval: 30 },
    { name: "Auth-Service",  type: "HTTP", target: "https://auth.internal/health", interval: 30 },
    { name: "Postgres",      type: "TCP",  target: "db.internal:5432", interval: 60 },
    { name: "DNS intern",    type: "DNS",  target: "internal.lan", interval: 60 },
    { name: "Payment-Proxy", type: "HTTP", target: "https://pay.internal/ping", interval: 20 }
  ];

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    var init = seed.map(function (s, i) {
      return {
        id: "s" + i + "-" + Date.now(),
        name: s.name, type: s.type, target: s.target, interval: s.interval,
        status: "UNKNOWN", responseMs: null, lastCheck: null
      };
    });
    save(init);
    return init;
  }
  function save(list) {
    try { localStorage.setItem(KEY, JSON.stringify(list)); } catch (e) { /* ignore */ }
  }

  var services = load();

  function severity(s) { return STATUSES.indexOf(s); }

  function simulateOne(svc) {
    // Weighted random: mostly OK, occasionally degraded/down.
    var r = Math.random();
    var status;
    if (r < 0.72) status = "OK";
    else if (r < 0.88) status = "DEGRADED";
    else if (r < 0.97) status = "DOWN";
    else status = "UNKNOWN";
    svc.status = status;
    svc.responseMs = status === "DOWN" ? null
      : Math.round((status === "DEGRADED" ? 400 : 40) + Math.random() * (status === "DEGRADED" ? 600 : 180));
    svc.lastCheck = Date.now();
  }

  function tick() {
    services.forEach(function (svc) {
      // Only re-check when the interval has elapsed (or never checked).
      if (!svc.lastCheck || (Date.now() - svc.lastCheck) >= svc.interval * 1000 / 10) {
        simulateOne(svc);
      }
    });
    save(services);
    render();
  }

  function counts() {
    var c = { OK: 0, DEGRADED: 0, DOWN: 0, UNKNOWN: 0 };
    services.forEach(function (s) { c[s.status]++; });
    return c;
  }

  function fmtTime(ts) {
    if (!ts) return "—";
    var d = new Date(ts);
    return d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function renderKpis() {
    var c = counts();
    var el = document.getElementById("kpis");
    var cells = [
      { key: null, cls: "", n: services.length, l: "Services" },
      { key: "OK", cls: "ok", n: c.OK, l: "OK" },
      { key: "DEGRADED", cls: "degraded", n: c.DEGRADED, l: "Degraded" },
      { key: "DOWN", cls: "down", n: c.DOWN, l: "Down" },
      { key: "UNKNOWN", cls: "unknown", n: c.UNKNOWN, l: "Unknown" }
    ];
    el.innerHTML = cells.map(function (k) {
      var pressed = activeFilter === k.key && k.key !== null;
      return '<div class="kpi ' + k.cls + '" role="button" aria-pressed="' + pressed +
        '" data-filter="' + (k.key === null ? "" : k.key) + '">' +
        '<div class="n">' + k.n + '</div><div class="l">' + k.l + '</div></div>';
    }).join("");
    el.querySelectorAll(".kpi").forEach(function (node) {
      node.addEventListener("click", function () {
        var f = node.getAttribute("data-filter");
        activeFilter = (f === "" || activeFilter === f) ? null : f;
        render();
      });
    });
  }

  function visibleServices() {
    var q = (document.getElementById("search").value || "").toLowerCase();
    return services
      .filter(function (s) { return !activeFilter || s.status === activeFilter; })
      .filter(function (s) {
        return !q || s.name.toLowerCase().indexOf(q) >= 0 || s.target.toLowerCase().indexOf(q) >= 0;
      })
      .sort(function (a, b) { return severity(b.status) - severity(a.status); });
  }

  function render() {
    renderKpis();
    var list = visibleServices();
    var content = document.getElementById("content");
    if (services.length === 0) {
      content.innerHTML = '<div class="empty"><h2>Noch kein Service angelegt</h2>' +
        '<p>Der Monitor überwacht Dienste per HTTP-, TCP- und DNS-Check. Lege den ersten an.</p>' +
        '<button class="primary" id="emptyAdd">Ersten Service hinzufügen</button></div>';
      document.getElementById("emptyAdd").addEventListener("click", openDialog);
      return;
    }
    var rows = list.map(function (s) {
      return '<tr>' +
        '<td><strong>' + escapeHtml(s.name) + '</strong></td>' +
        '<td><span class="type-pill">' + s.type + '</span></td>' +
        '<td class="mono">' + escapeHtml(s.target) + '</td>' +
        '<td><span class="badge ' + s.status + '">' + s.status + '</span></td>' +
        '<td class="mono">' + (s.responseMs == null ? "—" : s.responseMs + " ms") + '</td>' +
        '<td class="mono">' + fmtTime(s.lastCheck) + '</td>' +
        '<td><button class="del" data-id="' + s.id + '" title="Löschen">✕</button></td>' +
        '</tr>';
    }).join("");
    content.innerHTML = '<table><thead><tr><th>Name</th><th>Typ</th><th>Ziel</th>' +
      '<th>Status</th><th>Antwortzeit</th><th>Letzter Check</th><th></th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>';
    content.querySelectorAll(".del").forEach(function (b) {
      b.addEventListener("click", function () { deleteService(b.getAttribute("data-id")); });
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function deleteService(id) {
    services = services.filter(function (s) { return s.id !== id; });
    save(services); render();
  }

  // ----- Add dialog -----
  var dlg = document.getElementById("dlg");
  function openDialog() { if (typeof dlg.showModal === "function") dlg.showModal(); }
  document.getElementById("addBtn").addEventListener("click", openDialog);
  document.getElementById("cancelBtn").addEventListener("click", function () { dlg.close(); });
  document.getElementById("clearFilter").addEventListener("click", function () {
    activeFilter = null; document.getElementById("search").value = ""; render();
  });
  document.getElementById("search").addEventListener("input", render);

  var typeHints = {
    HTTP: "HTTP: vollständige URL inkl. https://",
    TCP:  "TCP: host:port, z. B. db.internal:5432",
    DNS:  "DNS: Domainname, z. B. internal.lan"
  };
  document.getElementById("f-type").addEventListener("change", function () {
    document.getElementById("targetHint").textContent = typeHints[this.value];
  });

  document.getElementById("svcForm").addEventListener("submit", function () {
    var name = document.getElementById("f-name").value.trim();
    var target = document.getElementById("f-target").value.trim();
    if (!name || !target) return;
    services.push({
      id: "s-" + Date.now(),
      name: name,
      type: document.getElementById("f-type").value,
      target: target,
      interval: parseInt(document.getElementById("f-interval").value, 10) || 30,
      status: "UNKNOWN", responseMs: null, lastCheck: null
    });
    save(services);
    this.reset();
    document.getElementById("targetHint").textContent = typeHints.HTTP;
    render();
  });

  // ----- Start -----
  render();
  tick();
  setInterval(tick, 3000);
})();
</script>
</body>
</html>
