# CI/CD-Pipeline fuer die Einsendeaufgabe BUI-E1.
# GitHub Actions ist der Orchestrator: er startet bei jedem Push einen
# Runner in der Cloud, der den Maven-Build aus bui-e1/maven-demo ausfuehrt.
name: BUI-E1 Build

# Nur ausloesen, wenn sich am Demo-Projekt oder am Workflow selbst etwas aendert
on:
  push:
    paths:
      - "bui-e1/maven-demo/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}   # erlaubt manuelles Starten ueber die GitHub-Oberflaeche

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bui-e1/maven-demo
    steps:
      # 1) Repo auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2) JDK 17 bereitstellen + Maven-Dependency-Cache (spart Downloadzeit)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # 3) Der eigentliche Build: kompilieren, testen, JAR bauen
      #    -B = batch mode (keine Fortschrittsbalken, sauberes Log)
      - name: Build with Maven
        run: mvn -B clean package

      # 4) Testberichte und das fertige JAR als Artefakt sichern
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-demo-build
          path: |
            bui-e1/maven-demo/target/*.jar
            bui-e1/maven-demo/target/surefire-reports/*
